# PortfolioM — 生产部署 docker-compose
# 用法: docker compose up -d --build

services:
  # ─── PostgreSQL ───
  pg:
    image: postgres:16-alpine
    container_name: portfoliom-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: portfoliom
      POSTGRES_PASSWORD: ${PG_PASSWORD:-portfoliom_prod}
      POSTGRES_DB: portfoliom
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfoliom"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (FastAPI) ───
  backend:
    build: ./backend
    container_name: portfoliom-backend
    restart: unless-stopped
    depends_on:
      pg:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+psycopg://portfoliom:${PG_PASSWORD:-portfoliom_prod}@pg:5432/portfoliom"
      APP_PASSWORD: "${APP_PASSWORD:-EmmaYe}"
    ports:
      - "127.0.0.1:8010:8000"
    volumes:
      - ./backend/data:/app/data
      - ./sourceData:/app/sourceData

  # ─── Frontend (Vite build → Nginx serve) ───
  frontend:
    build:
      context: ./frontend
      args:
        VITE_BASE: "/portfoliom/"
    container_name: portfoliom-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend

volumes:
  pg_data:
