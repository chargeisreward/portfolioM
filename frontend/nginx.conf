# 前端 Nginx — 静态文件 + API 反代
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # /portfoliom/api/ (VITE_BASE + API) — proxy to backend
    # ^~ 精确前缀匹配，最高优先级，避免被 /portfoliom/ alias 截胡
    # proxy_pass 保留 /api/ 前缀：/portfoliom/api/auth/login → backend 看到 /api/auth/login
    location ^~ /portfoliom/api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /portfoliom/ prefix (VITE_BASE) — alias to root (static + SPA fallback)
    location /portfoliom/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /portfoliom/index.html;
    }

    # /portfoliom2.0/ 旧路径 301 重定向到 /portfoliom/ (2026-06-30 用户反馈)
    # 用 rewrite 保留子路径：/portfoliom2.0/admin/... → /portfoliom/admin/...
    # rewrite 必须在 SPA fallback (location /) 之前，否则会被 fallthrough 兜底
    location ~ ^/portfoliom2\.0(/.*)?$ {
        return 301 /portfoliom$1;
    }

    # SPA fallback (index.html no-cache to avoid stale hashed JS references after rebuild)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed assets (Vite output) get long cache (1 year)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # API 反代到后端容器
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
