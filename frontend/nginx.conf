# 前端 Nginx — 静态文件 + API 反代
# 同时支持 /portfoliom/（本地 VITE_BASE）、/portfoliom2.0/（生产 VITE_BASE）、
# /portfoliom3.0/（主数据重构新版 VITE_BASE）
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # === /portfoliom/ (本地 VITE_BASE) — API proxy + 静态 + SPA fallback ===
    location ^~ /portfoliom/api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /portfoliom/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /portfoliom/index.html;
    }

    # === /portfoliom2.0/ (生产 VITE_BASE) — API proxy + 静态 + SPA fallback ===
    location ^~ /portfoliom2.0/api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /portfoliom2.0/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /portfoliom2.0/index.html;
    }

    # === /portfoliom3.0/ (主数据重构版 VITE_BASE) — API proxy + 静态 + SPA fallback ===
    location ^~ /portfoliom3.0/api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /portfoliom3.0/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /portfoliom3.0/index.html;
    }

    # SPA fallback (index.html no-cache to avoid stale hashed JS references after rebuild)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed assets (Vite output) get long cache (1 year)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # API 反代到后端容器
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
